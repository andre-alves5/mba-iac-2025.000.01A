name: "PROD DEPLOY"

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write

jobs:
  terraform:
    uses: ./.github/workflows/terraform.yml
    with:
      environment: prd
      aws-assume-role-arn: "arn:aws:iam::105634101543:role/github-actions-agallaghertech"
      aws-region: "sa-east-1"
      aws-statefile-s3-bucket: "agallaghertech-terraform-statefiles"
      aws-lock-dynamodb-table: "agallaghertech-terraform-lock"